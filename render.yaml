# Render Blueprint — deploy ambos servicios desde este repo.
# Doc: https://render.com/docs/blueprint-spec

services:
  # API / Backend Express
  - type: web
    name: nikolator-backend
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: npm install
    startCommand: node app.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: MQTT_BROKER_URL
        sync: false
      - key: MQTT_USERNAME
        sync: false
      - key: MQTT_PASSWORD
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AI_DEFAULT_MODEL
        value: claude-haiku-4-5
      - key: AI_HEAVY_MODEL
        value: claude-sonnet-4-6
      - key: AI_BUDGET_PER_ORG_USD
        sync: false

  # Web app / Frontend Next.js
  - type: web
    name: nikolator-app
    runtime: node
    plan: free
    region: oregon
    rootDir: frontend
    # --include=dev fuerza la instalación de devDependencies (tailwind, postcss, types)
    # aunque NODE_ENV=production las saltearía por defecto
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false

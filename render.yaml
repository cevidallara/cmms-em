# Render Blueprint — deploy ambos servicios desde este repo.
# Doc: https://render.com/docs/blueprint-spec

services:
  # API / Backend Express
  - type: web
    name: nikolator-backend
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: npm install
    startCommand: node app.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: MQTT_BROKER_URL
        sync: false
      - key: MQTT_USERNAME
        sync: false
      - key: MQTT_PASSWORD
        sync: false

  # Web app / Frontend Next.js
  - type: web
    name: nikolator-app
    runtime: node
    plan: free
    region: oregon
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false
